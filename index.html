<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Zak Obfuscator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Zak Obfuscator</h1>
    <div class="controls">
      <button id="themeToggle">Dark</button>
      <select id="modeSelect">
        <option value="fast">Fast Obfuscate</option>
        <option value="strong" selected>Strong Multi Layer</option>
      </select>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Input</h2>
      <textarea id="input" placeholder="حط سكربتك هنا..."></textarea>
      <div class="row">
        <button id="clearBtn">مسح الكل</button>
        <button id="obfBtn">Obfuscate</button>
      </div>
    </section>

    <section class="panel">
      <h2>Output</h2>
      <textarea id="output" placeholder="السكربت المشفّر يطلع هنا..." readonly></textarea>
      <div class="row">
        <button id="copyBtn">نسخ</button>
        <button id="downloadBtn">تحميل</button>
      </div>
    </section>

    <section class="panel">
      <h2>قائمة فك للاختبار</h2>
      <textarea id="deobInput" placeholder="حط سكربت مشفّر هنا لتجربة فك بسيط"></textarea>
      <div class="row">
        <button id="tryDeobBtn">حاول فك</button>
        <button id="clearDeobBtn">مسح</button>
      </div>
      <textarea id="deobOutput" placeholder="نتيجة محاولة الفك" readonly></textarea>
    </section>

    <footer>
      <small>مصنوع بواسطة Zak · استخدم الأداة لحماية كودك فقط</small>
    </footer>
  </main>

  <script src="obfuscator.js"></script>
  <script src="script.js"></script>
</body>
</html>
