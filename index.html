<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Luau Obfuscator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Luau Obfuscator</h1>

    <label>Original Luau Code</label>
    <textarea id="input" placeholder="Paste your Luau code here"></textarea>

    <div class="buttons">
      <button id="obfuscateBtn">Convert / Obfuscate</button>
      <button id="copyBtn">Copy Result</button>
    </div>

    <label>Obfuscated Code</label>
    <textarea id="output" placeholder="Obfuscated code will appear here"></textarea>
  </div>

  <script src="script.js"></script>
</body>
</html>
