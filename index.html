<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULOUS | X-VM GENERATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <div class="logo">NEBULOUS <span>V6</span></div>
            <div class="status">ENGINE: <span class="highlight">DYNAMIC-MUTATION</span></div>
        </header>
        <main>
            <div class="editor-container">
                <label>SOURCE LUA</label>
                <textarea id="input-code" spellcheck="false" placeholder="-- Paste code here..."></textarea>
            </div>
            <div class="controls">
                <button id="obfuscate-btn" class="main-btn">GENERATE ENCRYPTED VM</button>
                <div class="switches">
                    <label><input type="checkbox" id="anti-debug" checked> ANTI-DEBUG</label>
                    <label><input type="checkbox" id="junk-code" checked> JUNK-VOID</label>
                    <label><input type="checkbox" id="mutate" checked> MUTATION</label>
                </div>
            </div>
            <div class="editor-container">
                <label>PROTECTED OUTPUT</label>
                <textarea id="output-code" readonly spellcheck="false" placeholder="-- Encrypted code..."></textarea>
            </div>
            <div class="actions">
                <button id="copy-btn">COPY CLIPBOARD</button>
                <button id="download-btn">DOWNLOAD .LUA</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
